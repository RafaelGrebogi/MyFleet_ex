<!DOCTYPE html>  <!-- Select modern HTML -->
<html>
<head>
  <title>MyFleet Coding Exercise</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>Fleet Overview</h1>

  <!-- Display fleet summary information -->
  <h2>Summary</h2>
  <p id="total_km"></p>  <!-- Total fleet kilometers travelled -->
  <ul id="division_summary"></ul> <!-- List showing total kilometers travelled per division-->

  <!-- Filter to apply on the table -->
<div id="filter_div">
  <label> Filter: Greater than <input type="number" id="filterValue_input" name="filter_input"></label>
</div>
<div id="fbutton_div">
  <button id="btn_filter">Apply filter</button>
</div>
<div id="sbutton_div">
  <button id="btn_sort">Sort</button>
</div>


  <!-- Table showing all fleet -->
   <!-- Attributes included: Rego, Division, Kilometers -->
  <h2>Vehicles</h2> 
  <table border="1">
    <thead>
      <tr>
        <th>Registration</th>
        <th>Division</th>
        <th>Kilometres</th>
      </tr>
    </thead>
    <tbody id="vehicle_table"></tbody>
  </table>

  <!-- Script and Data files -->
  <script src="data.js"></script>
  <script src="script.js"></script>
  <script src="tests.js"></script>
</body>
</html>
